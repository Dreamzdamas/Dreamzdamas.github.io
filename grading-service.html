<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Grading | Dreamz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="alt-bg">
    <nav class="navbar scrolled">
        <div class="nav-brand"><a href="index.html#home">Dreamz</a></div>
        <ul class="nav-links">
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#portfolio">Portfolio</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <header class="hero" style="height: 50vh;">
        <div class="hero-bg" style="background: var(--bg-dark);">
            <img src="rd.jpg" alt="Color Grading Suite" style="object-fit: contain; width: 100%; height: 100%;">
            <div class="hero-overlay"
                style="background: linear-gradient(to bottom, rgba(5, 10, 31, 0) 0%, rgba(5, 10, 31, 1) 100%); pointer-events: none;"></div>
        </div>
        <div class="hero-content">
            <h1 class="title">color <span>grading</span></h1>
            <p class="description">establishing the exact mood and cinematic look with davinci resolve.</p>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <div class="section-header text-center">
                <h4 class="section-subtitle">portfolio</h4>
                <h2 class="section-title">chromatic showcase</h2>
            </div>

            <div class="color-grade-showcase reveal active" style="max-width: 900px; margin: 0 auto; background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05);">
                <div style="position: relative; border-radius: 8px; overflow: hidden; height: 50vh; min-height: 400px; background: #000;">
                    <img id="gradePreviewImg" src="dm.jpg" alt="Color Grading Showcase" style="width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease;">
                    <div id="gradeLabel" style="position: absolute; top: 1rem; right: 1rem; background: var(--primary); color: #000; padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 600; font-family: var(--font-head); font-size: 0.9rem; text-transform: lowercase;">Color Graded</div>
                </div>
                
                <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
                    <button class="filter-btn" 
                            onclick="document.getElementById('gradePreviewImg').src='dm 222.jpg'; document.getElementById('gradeLabel').innerText='Original Image'; document.getElementById('gradeLabel').style.background='rgba(255,255,255,0.8)'; document.getElementById('gradeLabel').style.color='#000';">
                        <i class="fa-solid fa-eye-slash"></i> View Original
                    </button>
                    <button class="filter-btn active" 
                            onclick="document.getElementById('gradePreviewImg').src='dm.jpg'; document.getElementById('gradeLabel').innerText='Color Graded'; document.getElementById('gradeLabel').style.background='var(--primary)'; document.getElementById('gradeLabel').style.color='#000';">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> View Color Graded
                    </button>
                </div>
            </div>

            <div class="text-center" style="margin-top: 4rem;">
                <a href="index.html#services" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> back to
                    services</a>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; Dreamz Visuals. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
